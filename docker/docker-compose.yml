# Observability stack for live k6 dashboards.
#
# Usage:
#   make up                                 # start InfluxDB + Grafana
#   make docker-run TEST=tests/smoke/api-smoke.js
#   open http://localhost:3000              # admin/admin, dashboard auto-provisioned
#
# k6 streams metrics to InfluxDB; Grafana reads from InfluxDB and renders the standard
# k6 community dashboard. Mount the repo into /scripts so the k6 container sees the tests.

services:
  influxdb:
    image: influxdb:1.8
    container_name: k6_influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: k6_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    container_name: k6_runner
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - ENV=${ENV:-staging}
    volumes:
      - ../:/scripts
    working_dir: /scripts
    depends_on:
      influxdb:
        condition: service_healthy
    # No default command — invoke via `docker compose run --rm k6 run /scripts/tests/...`.

volumes:
  influxdb-data:
  grafana-data:
